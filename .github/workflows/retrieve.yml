on:
  workflow_dispatch:

name: Retrieve Data

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------------------
  # Retrieve Eventbrite
  # ------------------------------------------------------------------------------
  retrieve_eventbrite:
    name: Retrieve Eventbrite
    runs-on: self-hosted
    steps:
      - uses: clusterflick/.github/setup@main
        with:
          playwright: true

      - name: eventbrite.co.uk
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 60
          max_attempts: 3
          command: npm run retrieve -- eventbrite.co.uk

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: retrieve_eventbrite
          path: retrieved-data/

      - name: Save test failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: retrieve_eventbrite-playwright-failures
          path: ./playwright-failures

  # ------------------------------------------------------------------------------
  # Retrieve TicketSource
  # ------------------------------------------------------------------------------
  retrieve_ticketsource:
