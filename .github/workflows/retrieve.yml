  # ------------------------------------------------------------------------------
  # Create release using data from all jobs
  # ------------------------------------------------------------------------------
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    # ncipollo/release-action creates a release + tag via GITHUB_TOKEN,
    # which requires contents: write (top-level default is contents: read).
    permissions:
      contents: write
    needs:
      [
        retrieve_eventbrite,
        retrieve_ticketsource,
        retrieve_sources,
        retrieve_source_only_1,
        retrieve_source_only_2,
        retrieve_source_only_3,
        retrieve_source_only_4,
        retrieve_source_only_5,
        retrieve_bfi,
        retrieve_cineworld,
        retrieve_curzon,
        retrieve_electric_cinema,
        retrieve_rooftopcinemaclub,
        retrieve_tate,
        retrieve_firmdale_hotels,
        retrieve_olympic_studios,
        retrieve_everyman,
        retrieve_vue_1,
        retrieve_vue_2,
        retrieve_odeon,
        retrieve_picturehouses_1,
        retrieve_picturehouses_2,
        retrieve_indy_cinema_group,
        retrieve_savoy_systems,
        retrieve_remaining_cinemas_1,
        retrieve_remaining_cinemas_2,
      ]
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: retrieved-data/
          merge-multiple: true
      - name: Drop Playwright failure artifacts
        # Retrieve jobs upload debugging screenshots/page dumps.
        # Strip out before they are published as part of the release.
        run: rm -f retrieved-data/error--*
      - name: Generate Tag
        run: echo "TAG=$(TZ=Europe/London date +'%Y%m%d.%H%M%S')" >> $GITHUB_ENV
      - uses: ncipollo/release-action@v1
        id: release
        with:
          allowUpdates: false
          artifactErrorsFailBuild: true
          artifacts: "retrieved-data/*"
          makeLatest: true
          tag: ${{ env.TAG }}
          commit: main
          body: |
            Created by job ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      - name: Output summary
        run: |
          echo "🔖 New release - ${{ steps.release.outputs.html_url }}" >> $GITHUB_STEP_SUMMARY

      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.PAT }}
          repository: clusterflick/data-transformed
          event-type: release_event
